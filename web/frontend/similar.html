<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm tương tự - Recommendation System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">📊 Recommendation System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">🏠 Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="/recommend.html">👤 Gợi ý cho người dùng</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/similar.html">🔗 Sản phẩm tương tự</a></li>
                    <li class="nav-item"><a class="nav-link" href="/coldstart.html">⭐ Người dùng mới</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="text-center mb-5">
            <h1 class="display-4">🔗 Sản Phẩm Tương Tự</h1>
            <p class="lead text-muted"></p>
        </div>

        <!-- Input form -->
        <div class="row mb-5">
            <div class="col-md-8 offset-md-2">
                <div class="input-group input-group-lg mb-3">
                    <input 
                        type="text" 
                        id="itemIdInput" 
                        class="form-control" 
                        placeholder="Nhập item_id (vd: B00000JBLQ)"
                    >
                    <button class="btn btn-primary" type="button" onclick="searchSimilar()">
                        🔍 Tìm
                    </button>
                </div>
                <small class="text-muted"></small>
            </div>
        </div>

        <!-- Item info -->
        <div id="itemInfo" style="display: none;">
            <div class="card mb-4 border-primary">
                <div class="card-header bg-primary text-white">
                    <h5 id="itemTitle" class="mb-0">Sản phẩm</h5>
                </div>
                <div class="card-body">
                    <p><strong>ID:</strong> <span id="itemId"></span></p>
                    <p id="itemDesc" class="text-muted"></p>
                </div>
            </div>
        </div>

        <!-- Loading spinner -->
        <div id="loading" class="text-center" style="display: none;">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Đang tải...</span>
            </div>
            <p class="mt-2">Đang tìm sản phẩm tương tự...</p>
        </div>

        <!-- Products grid -->
        <div id="similarContainer" class="row g-4">
            <!-- Items will be loaded here -->
        </div>

        <!-- Error message -->
        <div id="errorAlert" class="alert alert-danger" style="display: none;"></div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">Hệ Thống Gợi Ý - Amazon Office Products</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = window.location.origin;

        // Check URL params for item_id
        const urlParams = new URLSearchParams(window.location.search);
        const initialItemId = urlParams.get('item_id');
        if (initialItemId) {
            document.getElementById('itemIdInput').value = initialItemId;
            searchSimilar();
        }

        async function searchSimilar() {
            const itemId = document.getElementById('itemIdInput').value.trim();
            
            if (!itemId) {
                alert('⚠️ Vui lòng nhập item_id');
                return;
            }

            const loading = document.getElementById('loading');
            const container = document.getElementById('similarContainer');
            const errorAlert = document.getElementById('errorAlert');
            const itemInfo = document.getElementById('itemInfo');

            loading.style.display = 'block';
            errorAlert.style.display = 'none';
            container.innerHTML = '';
            itemInfo.style.display = 'none';

            try {
                // Get item metadata
                const metaResponse = await fetch(`${API_URL}/metadata/${encodeURIComponent(itemId)}`);
                if (metaResponse.ok) {
                    const metadata = await metaResponse.json();
                    if (metadata.title) {
                        document.getElementById('itemTitle').textContent = metadata.title;
                        document.getElementById('itemId').textContent = itemId;
                        document.getElementById('itemDesc').textContent = metadata.description || '';
                        itemInfo.style.display = 'block';
                    }
                }

                // Get similar items
                const response = await fetch(`${API_URL}/recommend/item/${encodeURIComponent(itemId)}?top_k=15`);
                if (!response.ok) throw new Error('API error: ' + response.status);
                
                const data = await response.json();

                if (data.similar_items.length === 0) {
                    container.innerHTML = '<div class="col-12"><div class="alert alert-warning">Không tìm thấy sản phẩm tương tự.</div></div>';
                } else {
                    data.similar_items.forEach(item => {
                        const card = createSimilarCard(item);
                        container.appendChild(card);
                    });
                }
            } catch (error) {
                console.error('Error:', error);
                errorAlert.textContent = '❌ Lỗi: ' + error.message;
                errorAlert.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }

        function createSimilarCard(item) {
            const div = document.createElement('div');
            div.className = 'col-md-6 col-lg-4';
            
            const title = item.metadata?.title || `Product ${item.item_id}`;
            const desc = item.metadata?.description ? item.metadata.description.substring(0, 100) + '...' : '';
            const imageUrl = item.metadata?.image_url || '';
            
            let cardHtml = `<div class="card h-100 shadow-sm product-card">`;
            
            // Add image if available
            if (imageUrl) {
                cardHtml += `<img src="${imageUrl}" class="card-img-top" alt="${title}" style="height: 250px; object-fit: cover;">`;
            }
            
            cardHtml += `
                    <div class="card-body">
                        <div class="rank-badge">✨ #${item.rank}</div>
                        <h5 class="card-title">${title}</h5>
                        ${desc ? `<p class="card-text small text-muted">${desc}</p>` : ``}
                        <div class="score-badge">Similarity: ${(item.score * 100).toFixed(2)}%</div>
                        <p class="card-text mt-2"><small><strong>ID:</strong> ${item.item_id}</small></p>
                    </div>
                    <div class="card-footer bg-white">
                        <button class="btn btn-sm btn-outline-secondary w-100" onclick="lookupItem('${item.item_id}')">
                            Xem tương tự
                        </button>
                    </div>
                </div>`;
            
            div.innerHTML = cardHtml;
            return div;
        }

        function lookupItem(itemId) {
            document.getElementById('itemIdInput').value = itemId;
            searchSimilar();
        }

        // Allow Enter key
        document.getElementById('itemIdInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchSimilar();
        });
    </script>
</body>
</html>
