<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gợi ý cho người dùng - Recommendation System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">📊 Recommendation System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">🏠 Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/recommend.html">👤 Gợi ý cho người dùng</a></li>
                    <li class="nav-item"><a class="nav-link" href="/similar.html">🔗 Sản phẩm tương tự</a></li>
                    <li class="nav-item"><a class="nav-link" href="/coldstart.html">⭐ Người dùng mới</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="text-center mb-5">
            <h1 class="display-4">👤 Gợi Ý Cho Người Dùng</h1>
            <p class="lead text-muted"> </p>
        </div>

        <!-- Input form -->
        <div class="row mb-5">
            <div class="col-md-8 offset-md-2">
                <div class="input-group input-group-lg mb-3">
                    <input 
                        type="text" 
                        id="userIdInput" 
                        class="form-control" 
                        placeholder="Nhập user_id (vd: A1234567890)"
                        @keyup.enter="searchUser"
                    >
                    <button class="btn btn-primary" type="button" onclick="searchUser()">
                        🔍 Tìm kiếm
                    </button>
                </div>
                <small class="text-muted"></small>
            </div>
        </div>

        <!-- User info -->
        <div id="userInfo" style="display: none;">
            <div class="alert alert-info" role="alert">
                <h5>👤 Người dùng: <strong id="displayUserId"></strong></h5>
                <p class="mb-0"><small id="userStats"></small></p>
            </div>
        </div>

        <!-- Loading spinner -->
        <div id="loading" class="text-center" style="display: none;">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Đang tải...</span>
            </div>
            <p class="mt-2">Đang tính toán gợi ý...</p>
        </div>

        <!-- Products grid -->
        <div id="recommendationsContainer" class="row g-4">
            <!-- Items will be loaded here -->
        </div>

        <!-- Error message -->
        <div id="errorAlert" class="alert alert-danger" style="display: none;"></div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">Hệ Thống Gợi Ý - Amazon Office Products</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = window.location.origin;

        // Check URL params for user_id
        const urlParams = new URLSearchParams(window.location.search);
        const initialUserId = urlParams.get('user_id');
        if (initialUserId) {
            document.getElementById('userIdInput').value = initialUserId;
            searchUser();
        }

        async function searchUser() {
            const userId = document.getElementById('userIdInput').value.trim();
            
            if (!userId) {
                alert('⚠️ Vui lòng nhập user_id');
                return;
            }

            const loading = document.getElementById('loading');
            const container = document.getElementById('recommendationsContainer');
            const errorAlert = document.getElementById('errorAlert');
            const userInfo = document.getElementById('userInfo');

            loading.style.display = 'block';
            errorAlert.style.display = 'none';
            container.innerHTML = '';
            userInfo.style.display = 'none';

            try {
                const response = await fetch(`${API_URL}/recommend/user/${encodeURIComponent(userId)}?top_k=15`);
                if (!response.ok) throw new Error('API error: ' + response.status);
                
                const data = await response.json();
                
                // Show user info
                document.getElementById('displayUserId').textContent = userId;
                document.getElementById('userStats').textContent = `Tìm thấy ${data.total} gợi ý`;
                userInfo.style.display = 'block';

                if (data.items.length === 0) {
                    container.innerHTML = '<div class="col-12"><div class="alert alert-warning">Không tìm thấy gợi ý cho người dùng này. Đang hiển thị sản phẩm phổ biến.</div></div>';
                } else {
                    data.items.forEach(item => {
                        const card = createRecommendationCard(item);
                        container.appendChild(card);
                    });
                }
            } catch (error) {
                console.error('Error:', error);
                errorAlert.textContent = '❌ Lỗi: ' + error.message;
                errorAlert.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }

        function createRecommendationCard(item) {
            const div = document.createElement('div');
            div.className = 'col-md-6 col-lg-4';
            
            const title = item.metadata?.title || `Product ${item.item_id}`;
            const desc = item.metadata?.description ? item.metadata.description.substring(0, 100) + '...' : '';
            const imageUrl = item.metadata?.image_url || '';
            
            let cardHtml = `<div class="card h-100 shadow-sm product-card">`;
            
            // Add image if available
            if (imageUrl) {
                cardHtml += `<img src="${imageUrl}" class="card-img-top" alt="${title}" style="height: 250px; object-fit: cover;">`;
            }
            
            cardHtml += `
                    <div class="card-body">
                        <div class="rank-badge">🎯 #${item.rank}</div>
                        <h5 class="card-title">${title}</h5>
                        ${desc ? `<p class="card-text small text-muted">${desc}</p>` : ``}
                        <div class="score-badge">Score: ${item.score.toFixed(4)}</div>
                        <p class="card-text mt-2"><small><strong>ID:</strong> ${item.item_id}</small></p>
                    </div>
                    <div class="card-footer bg-white">
                        <a href="/similar.html?item_id=${item.item_id}" class="btn btn-sm btn-outline-primary w-100">
                            Sản phẩm tương tự
                        </a>
                    </div>
                </div>`;
            
            div.innerHTML = cardHtml;
            return div;
        }

        // Allow Enter key
        document.getElementById('userIdInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchUser();
        });
    </script>
</body>
</html>
