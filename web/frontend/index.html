<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 20 Popular Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">📊 Recommendation System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="/">📱 Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="/recommend.html">👤 Gợi ý cho người dùng</a></li>
                    <li class="nav-item"><a class="nav-link" href="/similar.html">🔗 Sản phẩm tương tự</a></li>
                    <li class="nav-item"><a class="nav-link" href="/coldstart.html">⭐ Người dùng mới</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="text-center mb-5">
            <h1 class="display-4">🔥Sản phẩm phổ biến🔥</h1>
        </div>

        <div class="row mb-5">
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="stat-card">
                    <div class="stat-number">12.8M</div>
                    <div class="stat-label">Reviews</div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="stat-card">
                    <div class="stat-number">710K</div>
                    <div class="stat-label">Products</div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="stat-card">
                    <div class="stat-number">7.6M</div>
                    <div class="stat-label">Users</div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="stat-card">
                    <div class="stat-number">4.21</div>
                    <div class="stat-label">Avg Rating</div>
                </div>
            </div>
        </div>

        <div id="loading" class="text-center py-5" style="display: none;">
            <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
            <p class="mt-3 text-muted"><strong>Loading products...</strong></p>
        </div>

        <div id="productsContainer" class="row g-4"></div>
        <div id="errorAlert" class="alert alert-danger mt-4" style="display: none;"></div>
    </div>

    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">Recommendation System - Amazon Office Products</p>
            <small class="text-muted">FastAPI Backend + Vanilla JS Frontend</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function loadProducts() {
            var loading = document.getElementById('loading');
            var container = document.getElementById('productsContainer');
            var errorAlert = document.getElementById('errorAlert');

            loading.style.display = 'block';
            errorAlert.style.display = 'none';
            container.innerHTML = '';

            var apiUrl = window.location.origin + '/recommend/popular?top_k=20';

            fetch(apiUrl)
                .then(function(response) {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.json();
                })
                .then(function(data) {
                    if (!data.items || data.items.length === 0) {
                        throw new Error('No products');
                    }

                    container.innerHTML = '';
                    
                    data.items.forEach(function(item) {
                        var card = document.createElement('div');
                        card.className = 'col-md-6 col-lg-4';
                        
                        var title = (item.metadata && item.metadata.title) ? item.metadata.title : ('Product ' + item.item_id);
                        
                        card.innerHTML = 
                            '<div class="card h-100 shadow-sm product-card">' +
                            '<div class="card-body">' +
                            '<div class="rank-badge">🏆 #' + item.rank + '</div>' +
                            '<h5 class="card-title">' + title + '</h5>' +
                            '<div class="score-badge">Score: ' + Math.round(item.score) + '</div>' +
                            '<p class="card-text mt-2"><small><strong>ID:</strong> ' + item.item_id + '</small></p>' +
                            '</div>' +
                            '<div class="card-footer bg-white">' +
                            '<a href="/similar.html?item_id=' + item.item_id + '" class="btn btn-sm btn-outline-primary w-100">Xem tương tự</a>' +
                            '</div>' +
                            '</div>';
                        
                        container.appendChild(card);
                    });
                })
                .catch(function(error) {
                    errorAlert.innerHTML = '<strong>Error:</strong> ' + error.message;
                    errorAlert.style.display = 'block';
                    container.innerHTML = '<div class="col-12"><div class="alert alert-warning">Error: ' + error.message + '</div></div>';
                })
                .finally(function() {
                    loading.style.display = 'none';
                });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadProducts);
        } else {
            loadProducts();
        }
    </script>
</body>
</html>
