version: '3.8'

services:
  recommendation-api:
    build: .
    container_name: recommendation-system-api
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - RELOAD=False
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./web/backend:/app/backend
      - ./web/frontend:/app/frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: recommendation-system-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web/frontend:/usr/share/nginx/html:ro
    depends_on:
      - recommendation-api
    restart: unless-stopped
